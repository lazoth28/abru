```html
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feliz Cumpleaños 🎂</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    :root{
      --bg-start:#fdf6ee;
      --bg-end:#fce8d8;
      --accent:#e8866a;
      --text:#2b1f1a;
      --radius:18px;
      --transition:0.4s ease;
    }

    body{
      font-family:'DM Sans',sans-serif;
      background:linear-gradient(135deg,var(--bg-start),var(--bg-end));
      color:var(--text);
      text-align:center;
      padding-bottom:60px;
    }

    header{
      padding:60px 20px 40px;
    }

    h1{
      font-family:'Playfair Display',serif;
      font-size:3rem;
    }

    h1 em{color:var(--accent);}

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
      max-width:1100px;
      margin:auto;
      padding:20px;
    }

    /* =========================
       FOTO MEJORADA
    ========================= */
    .photo-card{
      position:relative;
      border-radius:var(--radius);
      overflow:hidden;
      cursor:pointer;
      background:#000;
      animation:fadeUp .8s ease both;
    }

    .photo-card img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      transition:transform var(--transition),filter var(--transition);
    }

    .photo-card:hover img{
      transform:scale(1.1);
      filter:brightness(.9);
    }

    .photo-card::after{
      content:'';
      position:absolute;
      inset:0;
      background:radial-gradient(circle,transparent 40%,rgba(0,0,0,.4));
      opacity:0;
      transition:var(--transition);
    }

    .photo-card:hover::after{
      opacity:1;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(20px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* =========================
       LIGHTBOX
    ========================= */
    .lightbox{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.9);
      backdrop-filter:blur(10px);
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:.3s;
      z-index:999;
    }

    .lightbox.active{
      opacity:1;
      pointer-events:all;
    }

    .lightbox img{
      max-width:90%;
      max-height:85%;
      border-radius:12px;
      transform:scale(.9);
      transition:.3s;
    }

    .lightbox.active img{
      transform:scale(1);
    }

    .lightbox::after{
      content:'✕';
      position:absolute;
      top:20px;
      right:30px;
      font-size:30px;
      color:white;
      cursor:pointer;
    }

    /* =========================
       VIDEO
    ========================= */
    .video-wrapper{
      margin-top:60px;
      width:100%;
      aspect-ratio:16/9;
      background:black;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    footer{
      margin-top:60px;
      font-size:.9rem;
    }

  </style>
</head>
<body>

<header>
  <h1>Feliz <em>Cumpleaños</em></h1>
  <p>Un año más y por cagadas juntos</p>
</header>

<section class="gallery">
  <div class="photo-card"><img src="1.jpeg"></div>
  <div class="photo-card"><img src="2.jpeg"></div>
  <div class="photo-card"><img src="3.jpeg"></div>
  <div class="photo-card"><img src="4.jpeg"></div>
  <div class="photo-card"><img src="5.jpeg"></div>
  <div class="photo-card"><img src="7.jpeg"></div>
</section>

<!-- VIDEO -->
<div class="video-wrapper">
  <video controls>
    <source src="8.mp4" type="video/mp4">
  </video>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img src="">
</div>

<footer>
  <p>Hecho con ❤️</p>
</footer>

<script>
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = lightbox.querySelector("img");

  document.querySelectorAll(".photo-card img").forEach(img=>{
    img.addEventListener("click",()=>{
      lightbox.classList.add("active");
      lightboxImg.src = img.src;
    });
  });

  lightbox.addEventListener("click",()=>{
    lightbox.classList.remove("active");
  });
</script>

</body>
</html>
```
