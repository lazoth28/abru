<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feliz Cumpleaños 🎂</title>

  <!-- Google Fonts: Playfair Display (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* =============================================
       VARIABLES Y RESET
    ============================================= */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-start:      #fdf6ee;
      --bg-end:        #fce8d8;
      --accent-1:      #e8866a;   /* terracota cálido */
      --accent-2:      #c9a96e;   /* dorado apagado   */
      --text-dark:     #2b1f1a;
      --text-mid:      #6b4f3a;
      --text-light:    #fff7f2;
      --overlay-start: rgba(43, 31, 26, 0.0);
      --overlay-end:   rgba(43, 31, 26, 0.78);
      --card-shadow:   0 8px 32px rgba(80, 40, 20, 0.13);
      --card-shadow-h: 0 16px 48px rgba(80, 40, 20, 0.26);
      --radius:        18px;
      --transition:    0.42s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* =============================================
       FONDO Y LAYOUT BASE
    ============================================= */
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      font-family: 'DM Sans', sans-serif;
      color: var(--text-dark);
      padding: 0 0 80px;
    }

    /* Patrón puntitos decorativos en el fondo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--accent-2) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    /* =============================================
       HEADER / HERO
    ============================================= */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 72px 24px 48px;
    }

    /* Línea decorativa superior */
    header::before {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      border-radius: 99px;
      margin: 0 auto 28px;
    }

    /* Emoji / detalle festivo */
    .header-emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-8px); }
    }

    /* Título principal — editable aquí ↓ */
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      color: var(--text-dark);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    h1 em {
      font-style: italic;
      color: var(--accent-1);
    }

    /* Subtítulo — editable aquí ↓ */
    .subtitle {
      margin-top: 14px;
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: var(--text-mid);
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* =============================================
       SEPARADOR DECORATIVO
    ============================================= */
    .divider {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 0 auto 56px;
      width: fit-content;
    }

    .divider::before,
    .divider::after {
      content: '';
      display: block;
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-2));
    }

    .divider::after {
      background: linear-gradient(90deg, var(--accent-2), transparent);
    }

    .divider-icon {
      font-size: 1.2rem;
    }

    /* =============================================
       GALERÍA (GRID)
    ============================================= */
    .gallery {
      position: relative;
      z-index: 1;
      display: grid;

      /* 3 columnas en escritorio, 2 en tablet, 1 en móvil */
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;

      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px;
    }

    /* =============================================
       TARJETA DE FOTO
    ============================================= */
    .photo-card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--card-shadow);
      cursor: pointer;

      /* Proporción 4:5 (tipo foto de retrato) */
      aspect-ratio: 4 / 5;

      transition: transform var(--transition), box-shadow var(--transition);
    }

    .photo-card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: var(--card-shadow-h);
    }

    /* La imagen de placeholder — reemplazar src="" por la URL real */
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform var(--transition);
    }

    .photo-card:hover img {
      transform: scale(1.08);
    }

    /* Overlay degradado que aparece en hover */
    .photo-card .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--overlay-end) 0%, var(--overlay-start) 60%);
      opacity: 0;
      transition: opacity var(--transition);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px 20px;
    }

    .photo-card:hover .overlay {
      opacity: 1;
    }

    /* Texto de la descripción — editable en cada tarjeta ↓ */
    .overlay .desc-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-light);
      margin-bottom: 4px;
      transform: translateY(8px);
      opacity: 0;
      transition: transform var(--transition), opacity var(--transition);
      transition-delay: 0.05s;
    }

    .overlay .desc-text {
      font-size: 0.82rem;
      color: rgba(255,247,242,0.82);
      font-weight: 300;
      line-height: 1.5;
      transform: translateY(8px);
      opacity: 0;
      transition: transform var(--transition), opacity var(--transition);
      transition-delay: 0.1s;
    }

    .photo-card:hover .overlay .desc-title,
    .photo-card:hover .overlay .desc-text {
      transform: translateY(0);
      opacity: 1;
    }

    /* Etiqueta decorativa (corazón / estrella) en la esquina */
    .photo-card .badge {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      background: rgba(255,247,242,0.92);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      opacity: 0;
      transform: scale(0.6);
      transition: opacity var(--transition), transform var(--transition);
    }

    .photo-card:hover .badge {
      opacity: 1;
      transform: scale(1);
    }

    /* =============================================
       PIE DE PÁGINA
    ============================================= */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 72px;
      font-size: 0.82rem;
      color: var(--text-mid);
      letter-spacing: 0.05em;
    }

    footer span {
      color: var(--accent-1);
    }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        padding: 0 20px;
      }
    }

    @media (max-width: 520px) {
      header {
        padding: 48px 20px 36px;
      }
      .gallery {
        grid-template-columns: 1fr;
        gap: 18px;
        padding: 0 16px;
      }
      .photo-card {
        aspect-ratio: 4 / 3;
      }
    }
  </style>
</head>
<body>

  <!-- =============================================
       ENCABEZADO
       Editar: emoji, título y subtítulo
  ============================================= -->
  <header>
    <span class="header-emoji">🎂</span>
    <h1>Feliz <em>Cumpleaños</em></h1>
    <!-- Subtítulo editable ↓ -->
    <p class="subtitle">Un año mas y por cagadas juntos</p>
  </header>

  <!-- Separador decorativo -->
  <div class="divider">
    <span class="divider-icon">✦</span>
  </div>

  <!-- =============================================
       GALERÍA
       Para reemplazar imágenes: cambiar el atributo src=""
       Para editar descripciones: cambiar .desc-title y .desc-text
       Para cambiar el emoji del badge: cambiar el contenido del .badge
  ============================================= -->
  <section class="gallery" aria-label="Galería de fotos">

    <!-- ── FOTO 1 ── -->
    <article class="photo-card">
      <!-- Reemplazar src con tu imagen real -->
      <img
        src="1.jpeg"
        alt="Foto 1"
        loading="lazy"
      />
    </article>

    <!-- ── FOTO 2 ── -->
    <article class="photo-card">
      <img
        src="2.jpeg"
        alt="Foto 2"
        loading="lazy"
      />
    </article>

    <!-- ── FOTO 3 ── -->
    <article class="photo-card">
      <img
        src="3.jpeg"
        alt="Foto 3"
        loading="lazy"
      />
    </article>

    <!-- ── FOTO 4 ── -->
    <article class="photo-card">
      <img
        src="4.jpeg"
        alt="Foto 4"
        loading="lazy"
      />
    </article>

    <!-- ── FOTO 5 ── -->
    <article class="photo-card">
      <img
        src="5.jpeg"
        alt="Foto 5"
        loading="lazy"
      />
    </article>

    <!-- ── FOTO 6 ── -->
    <article class="photo-card">
      <img
        src="7.jpeg"
        alt="Foto 6"
        loading="lazy"
      />
      <div class="overlay">
    </article>

  </section>
  <!-- =============================================
       PIE DE PÁGINA — editable ↓
  ============================================= -->
  <footer>
    <p>Hecho con <span>♥</span> para el mejor cumpleaños del año</p>
  </footer>

</body>
</html>
