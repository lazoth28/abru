<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Feliz Cumpleaños 🎂</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
/* ====== LO QUE YA TENÍAS ====== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#fdf6ee,#fce8d8);
  font-family:'DM Sans',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ====== GALERÍA CENTRADA ====== */
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:28px;
  max-width:1100px;
  width:100%;
  padding:20px;
  justify-content:center;
}

.photo-card{
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.4s;
}

.photo-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:.4s;
}

.photo-card:hover img{
  transform:scale(1.05);
}

/* ====== MODAL ====== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:999;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal img{
  max-width:90%;
  max-height:90%;
  border-radius:16px;
  transform:scale(.8);
  transition:.3s;
}

.modal.active img{
  transform:scale(1);
}

/* cerrar */
.modal::after{
  content:"✕";
  position:absolute;
  top:20px;
  right:30px;
  font-size:2rem;
  color:white;
  cursor:pointer;
}

/* responsive */
@media(max-width:900px){
  .gallery{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:500px){
  .gallery{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<h1 style="margin:40px 0;">Feliz Cumpleaños 🎂</h1>

<section class="gallery">
  <article class="photo-card"><img src="1.jpeg"></article>
  <article class="photo-card"><img src="2.jpeg"></article>
  <article class="photo-card"><img src="3.jpeg"></article>
  <article class="photo-card"><img src="4.jpeg"></article>
  <article class="photo-card"><img src="5.jpeg"></article>
  <article class="photo-card"><img src="7.jpeg"></article>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

document.querySelectorAll(".photo-card img").forEach(img => {
  img.addEventListener("click", () => {
    modal.classList.add("active");
    modalImg.src = img.src;
  });
});

modal.addEventListener("click", () => {
  modal.classList.remove("active");
});
</script>

</body>
</html>
